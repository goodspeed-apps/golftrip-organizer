name: E2E
# Cost-gated: a full EAS build per PR sync is expensive, so the workflow only
# triggers when mobile-affecting paths change. To force a run on a PR that
# doesn't match paths, attach the `e2e` label and uncomment the label gate
# below. The push-to-main trigger is retained because main is the release
# branch — comment it out if the same SHA already passed the PR run.
on:
  pull_request:
    types: [opened, synchronize, labeled]
    paths:
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'lib/**'
      - 'services/**'
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'app.config.js'
      - 'eas.json'
      - 'gas.config.ts'
      - 'package.json'
      - '.maestro/**'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'lib/**'
      - 'services/**'
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'app.config.js'
      - 'eas.json'
      - 'gas.config.ts'
      - 'package.json'
      - '.maestro/**'

jobs:
  check-secret:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.MAESTRO_CLOUD_API_KEY }}" ] && [ -n "${{ secrets.EAS_TOKEN }}" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "::notice::E2E skipped — MAESTRO_CLOUD_API_KEY and/or EAS_TOKEN not configured."
          fi

  run-maestro:
    needs: check-secret
    # Optional opt-in: uncomment the `contains(...)` clause to require an `e2e`
    # label on PRs instead of relying solely on the paths filter.
    # if: needs.check-secret.outputs.enabled == 'true' && github.event.pull_request.head.repo.full_name == github.repository && (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'e2e'))
    if: needs.check-secret.outputs.enabled == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      PR_NUMBER: ${{ github.event.number || 'main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN }}
      - name: Build iOS preview
        id: build
        run: |
          BUILD_URL=$(eas build --profile preview --platform ios --non-interactive --json --wait | jq -r '.[0].artifacts.buildUrl // empty')
          echo "url=$BUILD_URL" >> $GITHUB_OUTPUT
      - name: Maestro Cloud upload + run
        if: steps.build.outputs.url != ''
        uses: mobile-dev-inc/action-maestro-cloud@v1
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          app-file: ${{ steps.build.outputs.url }}
          workspace: ${{ secrets.MAESTRO_WORKSPACE_ID }}
          mapping-file: .maestro/smoke.yaml
      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 **Maestro E2E** completed. Build: ${{ steps.build.outputs.url }}`
            });
