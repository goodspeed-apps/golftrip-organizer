name: EAS Preview
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check-secret:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.EAS_TOKEN }}" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "::notice::EAS_TOKEN not set — skipping preview build. Add it in repo settings → Secrets to enable."
          fi

  publish-preview:
    needs: check-secret
    if: needs.check-secret.outputs.enabled == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN }}
      - id: update
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          UPDATE_URL=$(eas update --branch=pr-${{ github.event.number }} --message="$PR_TITLE" --non-interactive --json | jq -r '.[0].url // .url // empty')
          echo "url=$UPDATE_URL" >> $GITHUB_OUTPUT
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.update.outputs.url }}';
            const body = url
              ? `📱 **EAS Preview** ready: ${url}\n\nScan with Expo Go (dev client) or open on a configured device.`
              : `⚠️ EAS update published but URL extraction failed. Check the workflow logs for the update ID.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
